  name: c3
  ntp_servers:
  - ntp-1.net.rubrik.com
  - ntp-2.net.rubrik.com
  - ntp-3.net.rubrik.com
  dns_nameservers:
  - 10.1.253.53
  - 10.1.253.140
  - 10.1.253.141
  dns_search_domains:
  - rubrik-lab.com
# Node definitions.
