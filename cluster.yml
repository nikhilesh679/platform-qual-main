    # Defines the datastore to export VMs on.
  export_datastore:
    name: esx-5-117_local_ssd
# Protected VM configuration.
#
# Defines the primary VMs being protected. Find or create VMs that you own,
# then get their vSphere names and guest info.
#
# Note: For data verification, one and only one of the following sections
# need to be specified:
#   ssh
#   cifs
#   odbc
#   ldap
#
# NB: to pass acceptance, you must protect at least one VM from the first
# vSphere listed above.
data_sets:
  # Files and filesystem metadata on Linux. Deliberately does not include
  # highly dynamic paths such as /var because those will change whenever a VM
  # boots up and so can't generally be validated against the snapshot.
- id: linux_basic
  filesystems:
  - /dev/sda1
  files:
  - /bin
  - /etc
  - /home
  - /lib
  - /root
  - /sbin
  - /usr
    # The file which is changing when each snapshot is taken. Be sure to
    # include this in the list of files to validate.
    #
    # In the future we should have fancier workload simulation tools to change
    # more files or application objects. For now, just doing something simple.
  changing_file: /root/snapshot.txt
    # Any specified files or files that are inside the specified directories
    # are not included while calculating the data digest.
  exclude_file_paths:
  - /usr/lib/vmware-tools
  - /etc/mtab
  # Files on Windows. Deliberately does not include highly dynamic paths such as
  # /Windows because those will change frequently and so can't generally be
  # validated against the snapshot.
- id: windows_basic
  files:
  - /Program Files
  - /Program Files (x86)
  - /Rubrik
  changing_file: /Rubrik/snapshot.txt
  # Tables to check on SQL Server database. Tests calculate MD5 digest for each
  # row of the table, indexed by the unique_key.
- id: sql_server
  tables:
  - name: sys.all_objects
    unique_key: object_id
  - name: msdb.dbo.syspolicy_policies
    unique_key: policy_id
  - name: msdb.dbo.syspolicy_conditions
    unique_key: condition_id
  - name: rktest
    unique_key: timestamp
    # A new row is added to this table for each snapshot taken.
    # Be sure the include this table in the list of tables to validate.
  changing_table: rktest
