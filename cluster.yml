# Configuration for Rubrik tests.
# The deployment being tested.
#
# Used for out-of-band operations to manage the test deployment itself. This
# and testers below are the only configuration section with values that are
# not visible to a customer.
deployment:
  cluster_sh: ../deployment/cluster.sh
  inventory: mix-02_ipv6
# Test workers.
#
# Used for managing test workers which simulate multiple concurrent actions
# taken by the customer.
test_workers:
  inventory: ../deployment/ansible/localhost_inventory
# All values below are meant to be defined by customers for their specific
# environments.
# Cluster definition.
cluster:
  name: c3
  ntp_servers:
  - ntp-1.net.rubrik.com
  - ntp-2.net.rubrik.com
  - ntp-3.net.rubrik.com
  dns_nameservers:
  - 10.1.253.53
  - 10.1.253.140
  - 10.1.253.141
  dns_search_domains:
  - rubrik-lab.com
# Node definitions.
#
# When exercising cluster bootstrap, nodes matching the hostnames here will be
# discovered, then configured into a cluster with the given IPv4
# configurations.
#
# When exercising other pieces that assume cluster bootstrap has already
# completed, these are the nodes and their properties that are expected to
# exist, whether by exercising cluster bootstrap through acceptance test or
# by configuring them some other way, such as manually. In particular, the
# IPv4 addresses defined here (usually the first one) will be used for making
# REST API calls.
nodes:
- hostname: RHPDL360PLUSPZCRD0CRHGN26Q
  physical: true
  # Replacing pxeserver with pxeserverip to remove host_vars dependency.
  # devpxe-10-16-28-x's ip address is 10.16.28.15
  pxeserverip: 10.1.44.4
  pxe: true
  ipmi:
    address: 10.1.44.89
    gateway: 10.1.44.1
    netmask: 255.255.252.0
    # Reserved DHCP Address.
    # Check out deployment/ansible/host_vars/devpxe-10-16-28-x/main.yml
    reserved_dhcp_address: 10.1.45.189
    default_admin_user: Administrator
  ipv4:
    type: static
    address: 10.0.62.132
    netmask: 255.255.0.0
    gateway: 10.0.0.255
  mac_address_0: "40:a6:b7:8d:35:04"
  mac_address_1: "40:a6:b7:8d:35:05"
  ipv6:
    interface: bond0
    address: "fe80::42a6:b7ff:fe8d:3505"

