# Configuration for Rubrik tests.
# The deployment being tested.
#
# Used for out-of-band operations to manage the test deployment itself. This
# and testers below are the only configuration section with values that are
# not visible to a customer.
deployment:
  cluster_sh: ../deployment/cluster.sh
  inventory: mix-02_ipv6
# Test workers.
#
# Used for managing test workers which simulate multiple concurrent actions
# taken by the customer.
test_workers:
  inventory: ../deployment/ansible/localhost_inventory
# All values below are meant to be defined by customers for their specific
# environments.
# Cluster definition.
