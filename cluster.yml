# When exercising other pieces that assume cluster bootstrap has already
# completed, these are the nodes and their properties that are expected to
# exist, whether by exercising cluster bootstrap through acceptance test or
# by configuring them some other way, such as manually. In particular, the
# IPv4 addresses defined here (usually the first one) will be used for making
# REST API calls.
